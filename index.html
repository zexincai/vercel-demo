<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻夜空demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #0a0a1a; overflow: hidden;
    font-family: 'Georgia', serif;
  }
  svg { width: 100%; max-width: 800px; height: auto; }

  /* 星星闪烁 */
  @keyframes twinkle1 { 0%,100%{opacity:0.3} 50%{opacity:1} }
  @keyframes twinkle2 { 0%,100%{opacity:0.6} 40%{opacity:1} 80%{opacity:0.2} }
  @keyframes twinkle3 { 0%,100%{opacity:0.4} 30%{opacity:0.9} 70%{opacity:0.15} }
  .s1 { animation: twinkle1 3s ease-in-out infinite; }
  .s2 { animation: twinkle2 4s ease-in-out infinite; }
  .s3 { animation: twinkle3 3.5s ease-in-out infinite; }

  /* 流星 */
  @keyframes shoot {
    0%   { transform: translate(0, 0); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(-400px, 300px); opacity: 0; }
  }
  .shooting-star { animation: shoot 2.5s ease-in infinite; }
  .shooting-star:nth-child(2) { animation-delay: 4s; }
  .shooting-star:nth-child(3) { animation-delay: 1.5s; }

  /* 月亮光晕 */
  @keyframes moonGlow { 0%,100%{opacity:0.5} 50%{opacity:0.8} }
  .moon-glow { animation: moonGlow 6s ease-in-out infinite; }

  /* 萤火虫 */
  @keyframes float1 {
    0%   { transform: translate(0,0) scale(1); opacity: 0.8; }
    25%  { transform: translate(30px,-40px) scale(0.6); opacity: 0.3; }
    50%  { transform: translate(-20px,-80px) scale(1.2); opacity: 1; }
    75%  { transform: translate(-40px,-30px) scale(0.5); opacity: 0.2; }
    100% { transform: translate(0,0) scale(1); opacity: 0.8; }
  }
  @keyframes float2 {
    0%   { transform: translate(0,0) scale(1); opacity: 0.6; }
    33%  { transform: translate(-35px,-50px) scale(1.3); opacity: 1; }
    66%  { transform: translate(25px,-85px) scale(0.5); opacity: 0.2; }
    100% { transform: translate(0,0) scale(1); opacity: 0.6; }
  }
  @keyframes float3 {
    0%   { transform: translate(0,0); opacity: 0.7; }
    20%  { transform: translate(40px,-25px); opacity: 0.3; }
    50%  { transform: translate(-15px,-70px); opacity: 1; }
    80%  { transform: translate(-50px,-20px); opacity: 0.15; }
    100% { transform: translate(0,0); opacity: 0.7; }
  }
  .firefly1 { animation: float1 7s ease-in-out infinite; }
  .firefly2 { animation: float2 9s ease-in-out infinite; }
  .firefly3 { animation: float3 8s ease-in-out infinite; }

  /* 水面波纹 */
  @keyframes ripple {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .water-ripple { animation: ripple 4s ease-in-out infinite; }

  /* 云飘动 */
  @keyframes drift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(60px); }
  }
  .cloud { animation: drift 20s ease-in-out infinite alternate; }

  /* 标题浮现 */
  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .title-text { animation: fadeInUp 2s ease-out forwards; }
</style>
</head>
<body>

<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 夜空渐变 -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0a2e"/>
      <stop offset="30%"  stop-color="#1a1040"/>
      <stop offset="55%"  stop-color="#2d1b69"/>
      <stop offset="75%"  stop-color="#e8607a"/>
      <stop offset="90%"  stop-color="#f4a460"/>
      <stop offset="100%" stop-color="#ffe4b5"/>
    </linearGradient>

    <!-- 湖面渐变 -->
    <linearGradient id="lakeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2d1b69" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#1a1040" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0.95"/>
    </linearGradient>

    <!-- 月亮光晕径向渐变 -->
    <radialGradient id="moonGlowGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#fffde7" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#fff9c4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>

    <!-- 月光倒影渐变 -->
    <linearGradient id="moonReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fffde7" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#fff9c4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </linearGradient>

    <!-- 萤火虫光晕 -->
    <radialGradient id="fireflyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#a6ff00" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#a6ff00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a6ff00" stop-opacity="0"/>
    </radialGradient>

    <!-- 树木剪影滤镜 -->
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- ═══════════════════════ 天空 ═══════════════════════ -->
  <rect x="0" y="0" width="800" height="600" fill="url(#skyGrad)"/>

  <!-- ═══════════════════════ 星星 ═══════════════════════ -->
  <g fill="white">
    <circle cx="50"  cy="40"  r="1.5" class="s1"/>
    <circle cx="120" cy="80"  r="1"   class="s2"/>
    <circle cx="180" cy="25"  r="1.8" class="s3"/>
    <circle cx="250" cy="60"  r="1.2" class="s1"/>
    <circle cx="310" cy="35"  r="2"   class="s2"/>
    <circle cx="400" cy="50"  r="1"   class="s3"/>
    <circle cx="470" cy="70"  r="1.5" class="s1"/>
    <circle cx="530" cy="30"  r="1.3" class="s2"/>
    <circle cx="600" cy="55"  r="1.8" class="s3"/>
    <circle cx="670" cy="45"  r="1"   class="s1"/>
    <circle cx="720" cy="85"  r="1.4" class="s2"/>
    <circle cx="760" cy="20"  r="1.6" class="s3"/>
    <circle cx="90"  cy="110" r="1"   class="s1"/>
    <circle cx="200" cy="95"  r="1.3" class="s2"/>
    <circle cx="350" cy="100" r="1.1" class="s3"/>
    <circle cx="490" cy="90"  r="1.7" class="s1"/>
    <circle cx="640" cy="105" r="1"   class="s2"/>
    <circle cx="700" cy="120" r="1.5" class="s3"/>
    <circle cx="440" cy="15"  r="1.2" class="s1"/>
    <circle cx="150" cy="55"  r="0.9" class="s2"/>
  </g>

  <!-- ═══════════════════════ 流星 ═══════════════════════ -->
  <g class="shooting-star" opacity="0">
    <line x1="680" y1="30" x2="620" y2="70" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="680" y1="30" x2="640" y2="58" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>
  <g class="shooting-star" opacity="0">
    <line x1="750" y1="15" x2="690" y2="55" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <line x1="750" y1="15" x2="710" y2="43" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  </g>
  <g class="shooting-star" opacity="0">
    <line x1="550" y1="10" x2="500" y2="45" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="550" y1="10" x2="515" y2="36" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ═══════════════════════ 月亮 + 光晕 ═══════════════════════ -->
  <circle cx="620" cy="140" r="70" fill="url(#moonGlowGrad)" class="moon-glow"/>
  <circle cx="620" cy="140" r="35" fill="#fffde7"/>
  <!-- 月亮表面环形山 -->
  <g fill="#f0e68c" opacity="0.4">
    <circle cx="610" cy="130" r="6"/>
    <circle cx="630" cy="148" r="4"/>
    <circle cx="608" cy="150" r="3"/>
    <circle cx="638" cy="128" r="5"/>
    <circle cx="622" cy="155" r="3.5"/>
  </g>

  <!-- ═══════════════════════ 云层 ═══════════════════════ -->
  <g class="cloud" fill="white" opacity="0.12">
    <ellipse cx="100" cy="160" rx="80" ry="18"/>
    <ellipse cx="140" cy="155" rx="55" ry="15"/>
    <ellipse cx="60"  cy="155" rx="45" ry="12"/>
  </g>
  <g class="cloud" fill="white" opacity="0.08">
    <ellipse cx="400" cy="140" rx="70" ry="15"/>
    <ellipse cx="440" cy="135" rx="50" ry="13"/>
    <ellipse cx="365" cy="136" rx="40" ry="11"/>
  </g>

  <!-- ═══════════════════════ 远山 ═══════════════════════ -->
  <polygon points="0,380 100,300 200,340 300,280 420,350 520,310 650,360 800,320 800,600 0,600"
           fill="#1a1040" opacity="0.8"/>
  <polygon points="0,420 80,360 180,390 280,330 400,400 500,350 620,400 750,360 800,380 800,600 0,600"
           fill="#150d35" opacity="0.9"/>
  <polygon points="0,460 120,400 220,430 350,370 460,440 580,395 700,430 800,410 800,600 0,600"
           fill="#0f0828"/>

  <!-- ═══════════════════════ 树 ═══════════════════════ -->
  <g fill="#0a0520">
    <polygon points="30,450 15,390 25,390 10,340 28,340 30,450"/>
    <polygon points="45,450 35,400 45,400 32,355 50,355 45,450"/>
    <polygon points="65,450 55,395 65,395 52,360 68,360 65,450"/>
    <polygon points="750,430 735,375 745,375 730,325 750,325 750,430"/>
    <polygon points="770,430 758,380 768,380 755,335 772,335 770,430"/>
    <polygon points="720,440 710,390 720,390 705,345 722,345 720,440"/>
  </g>

  <!-- ═══════════════════════ 湖面 ═══════════════════════ -->
  <rect x="0" y="430" width="800" height="170" fill="url(#lakeGrad)"/>

  <!-- 月光倒影 -->
  <ellipse cx="620" cy="460" rx="30" ry="60" fill="url(#moonReflect)" class="water-ripple"/>

  <!-- 水面波纹 -->
  <g class="water-ripple" stroke="#fffde7" stroke-width="0.5" fill="none" opacity="0.15">
    <path d="M200,445 Q250,443 300,445 Q350,447 400,445"/>
    <path d="M350,465 Q400,463 450,465 Q500,467 550,465"/>
    <path d="M100,475 Q160,473 220,475 Q280,477 340,475"/>
    <path d="M500,480 Q550,478 600,480 Q650,482 700,480"/>
    <path d="M250,500 Q310,498 370,500 Q430,502 490,500"/>
    <path d="M450,520 Q510,518 570,520 Q630,522 690,520"/>
    <path d="M180,530 Q240,528 300,530 Q360,532 420,530"/>
  </g>

  <!-- ═══════════════════════ 萤火虫 ═══════════════════════ -->
  <g class="firefly1">
    <circle cx="150" cy="440" r="12" fill="url(#fireflyGlow)" opacity="0.5"/>
    <circle cx="150" cy="440" r="2.5" fill="#ccff00"/>
  </g>
  <g class="firefly2">
    <circle cx="500" cy="420" r="10" fill="url(#fireflyGlow)" opacity="0.5"/>
    <circle cx="500" cy="420" r="2" fill="#ccff00"/>
  </g>
  <g class="firefly3">
    <circle cx="350" cy="460" r="11" fill="url(#fireflyGlow)" opacity="0.5"/>
    <circle cx="350" cy="460" r="2.2" fill="#ccff00"/>
  </g>
  <g class="firefly1" style="animation-delay: -3s">
    <circle cx="680" cy="450" r="9" fill="url(#fireflyGlow)" opacity="0.5"/>
    <circle cx="680" cy="450" r="2" fill="#ccff00"/>
  </g>
  <g class="firefly2" style="animation-delay: -5s">
    <circle cx="250" cy="470" r="10" fill="url(#fireflyGlow)" opacity="0.5"/>
    <circle cx="250" cy="470" r="2.3" fill="#ccff00"/>
  </g>

  <!-- ═══════════════════════ 远处灯光 ═══════════════════════ -->
  <g class="s1" fill="#ffe066">
    <rect x="285" y="385" width="3" height="2" rx="0.5"/>
    <rect x="305" y="390" width="3" height="2" rx="0.5"/>
    <rect x="320" y="382" width="3" height="2" rx="0.5"/>
    <rect x="295" y="392" width="3" height="2" rx="0.5"/>
  </g>
  <g class="s2" fill="#ffe066">
    <rect x="560" y="380" width="3" height="2" rx="0.5"/>
    <rect x="575" y="385" width="3" height="2" rx="0.5"/>
    <rect x="555" y="388" width="3" height="2" rx="0.5"/>
  </g>

  <!-- ═══════════════════════ 文字 ═══════════════════════ -->
  <text x="400" y="520" text-anchor="middle" class="title-text"
        fill="white" font-size="26" font-weight="bold"
        letter-spacing="6" opacity="0.85">
    梦幻星空
  </text>
  <text x="400" y="555" text-anchor="middle" class="title-text"
        fill="white" font-size="13" letter-spacing="8"
        opacity="0.5" style="animation-delay: 0.5s">
    DREAMY  NIGHT
  </text>

  <line x1="340" y1="538" x2="395" y2="538" stroke="white" stroke-width="0.5" opacity="0.3" class="title-text" style="animation-delay: 0.8s"/>
  <line x1="405" y1="538" x2="460" y2="538" stroke="white" stroke-width="0.5" opacity="0.3" class="title-text" style="animation-delay: 0.8s"/>

</svg>

</body>
</html>
